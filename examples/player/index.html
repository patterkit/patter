<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patter Player</title>
  <style>
    :root { color-scheme: light dark; --bg: #11131a; --panel: #1b1e28; --ink: #e8e8ef; --muted: #9aa0b4; --accent: #6ea8fe; --line: #2a2e3c; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 16px/1.55 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--ink); }
    header { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 14px 20px; border-bottom: 1px solid var(--line); background: var(--panel); }
    header h1 { font-size: 16px; margin: 0 12px 0 0; font-weight: 650; letter-spacing: .2px; }
    header .spacer { flex: 1; }
    button, label.file { font: inherit; border: 1px solid var(--line); background: #232838; color: var(--ink); padding: 7px 13px; border-radius: 8px; cursor: pointer; }
    button:hover, label.file:hover { border-color: var(--accent); }
    label.file input { display: none; }
    main { max-width: 760px; margin: 0 auto; padding: 22px 20px 120px; }
    #stage > div { margin: 0 0 14px; }
    .line .who { display: inline-block; font-weight: 650; color: var(--accent); margin-right: 8px; }
    .prose { color: var(--muted); font-style: italic; padding-left: 4px; border-left: 2px solid var(--line); }
    .gameEvent { color: #c8a96a; font-size: 14px; } .gameEvent code { background: #0006; padding: 1px 5px; border-radius: 4px; } .gameEvent .data { color: var(--muted); }
    .picked { color: var(--muted); font-size: 14px; }
    .end { color: var(--muted); text-align: center; letter-spacing: 2px; margin-top: 18px; }
    .error { color: #ff8a8a; }
    #controls { position: fixed; bottom: 0; left: 0; right: 0; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 16px; background: linear-gradient(to top, var(--bg) 60%, transparent); }
    #controls .choice { border-color: var(--accent); }
    #controls .choice.disabled { opacity: .45; cursor: not-allowed; border-color: var(--line); }
    #controls .continue { color: var(--muted); }
    .hint { color: var(--muted); text-align: center; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>Patter Player</h1>
    <button id="sample">▶ Play sample</button>
    <label class="file">Load .patterc<input id="file" type="file" accept=".patterc,application/json,.json" /></label>
    <button id="save" title="Snapshot the current flow to this browser">⤓ Save</button>
    <button id="load" title="Restore the last saved snapshot">⤒ Load</button>
    <span class="spacer"></span>
    <span id="status" style="color:var(--muted);font-size:13px">game-agnostic runtime demo</span>
  </header>
  <main>
    <div id="stage"></div>
    <p class="hint" id="hint">Click <strong>Play sample</strong>, or load a <code>.patterc</code> exported by <code>patter export</code>.</p>
  </main>
  <div id="controls"></div>
  <script src="./dist/player.js"></script>
</body>
</html>
