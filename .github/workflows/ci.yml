name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patter
        uses: actions/checkout@v5
        with:
          path: patter
      # tsconfig + vitest alias @wildwinter/expr to a sibling ../expr checkout (dev tests
      # against its source, not the published version). Mirror that here so CI sees the same.
      - name: Checkout @wildwinter/expr (sibling source)
        uses: actions/checkout@v5
        with:
          repository: wildwinter/expr
          path: expr
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: patter/package-lock.json
      - run: npm ci
        working-directory: patter
      - run: npm run typecheck
        working-directory: patter
      - run: npm test
        working-directory: patter
      - run: npm run build
        working-directory: patter
      # `npm run build` regenerates the inlined runtime blob (ops prebuild). If the committed
      # copy drifted from the current runtime, playable-HTML exports would ship a stale engine
      # (this is how Best match silently missed the blob once). Fail loudly instead.
      - name: Generated runtime blob is up to date
        working-directory: patter
        run: |
          if ! git diff --quiet -- packages/ops/src/playable-runtime.ts; then
            echo "::error::packages/ops/src/playable-runtime.ts is stale - run 'npm run gen-runtime-blob -w @patterkit/ops' and commit the result."
            git diff -- packages/ops/src/playable-runtime.ts | head -20
            exit 1
          fi
      # The conformance corpus pins BEHAVIOUR, but only of the calls a case actually makes - an API that
      # no case exercises can live on ONE runtime alone (advanceToStop did exactly that). This proves all
      # four surfaces HAVE the same members; the corpus proves they agree on what they do.
      - name: Patterplay runtimes expose the same API
        working-directory: patter
        run: node scripts/check-runtime-api-parity.mjs
      # The four Patterplay runtimes (JS + Unity/Unreal/Godot) must share one version. A Changesets
      # cascade can bump @patterkit/runtime alone and break lockstep with the ports - catch that here.
      - name: Patterplay runtimes are in lockstep
        working-directory: patter
        run: node scripts/check-runtime-lockstep.mjs

  changeset-check:
    # A nudge, not a gate: warns on PRs that touch a published package without a changeset.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: changeset status
        run: npx changeset status --since=origin/${{ github.base_ref }} || echo "::warning::No changeset for this PR - add one with 'npm run changeset' if it touches a published package."
