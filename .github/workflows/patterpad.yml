name: Patterpad release

# The desktop app has its own tag-driven pipeline (not Changesets): tagging
# `vX.Y.Z` builds + signs Patterpad on each OS and publishes the installers
# + the electron-updater feeds (latest-mac.yml / latest.yml / latest-linux.yml)
# to the matching GitHub Release.
#
# Patterpad is the ONE deliverable on bare `v*` tags, and that is load-bearing:
# electron-builder's GitHub publisher can only target `v<version>` tags, and
# electron-updater's GitHub provider walks the releases feed skipping any tag
# that isn't plain semver (so cli-v* / play-*-v* / @patterkit/* releases are
# invisible to it). Never give another deliverable a bare v* tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Pre-create the release as a DRAFT with the changelog section as its notes; the OS matrix
  # uploads installers into it (electron-builder reuses a draft whose tag matches), and the
  # final `publish` job flips it live once every OS build has uploaded - the draft is only a
  # staging area so a half-built release is never visible.
  notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the draft release with the changelog as notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" 'index($0, "## [" ver "]") == 1 {f=1; next} /^## \[/ {f=0} f' \
            packages/patterpad/CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          [ -s "$RUNNER_TEMP/release-notes.md" ] || { echo "no changelog section for ${version}"; exit 1; }
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --draft --title "Patterpad $version" \
              --notes-file "$RUNNER_TEMP/release-notes.md"

  build:
    needs: notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout patter
        uses: actions/checkout@v4
        with:
          path: patter
      - name: Checkout @wildwinter/expr (electron-vite bundles its source)
        uses: actions/checkout@v4
        with:
          repository: wildwinter/expr
          path: expr
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: patter/package-lock.json
      - run: npm ci
        working-directory: patter
      - name: Check the tag matches the app version (bump via `npm run bump:pad`)
        working-directory: patter
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          manifest=$(node -p "require('./packages/patterpad/package.json').version")
          [ "$manifest" = "$version" ] || { echo "package.json says $manifest but the tag says $version"; exit 1; }
          grep -q "^## \[${version}\] - [0-9]" packages/patterpad/CHANGELOG.md \
            || { echo "CHANGELOG.md has no dated ${version} section"; exit 1; }
      - name: Build, sign + publish
        working-directory: patter
        run: npm run -w @patterkit/patterpad ${{ matrix.script }} -- --publish always
        env:
          # electron-builder's GitHub publisher uploads to the release for this tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (no-ops on win/linux). See packages/patterpad/RELEASE.md.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  # All three OS builds uploaded -> publish. Straight-from-CI like every other deliverable;
  # runs only when the whole matrix succeeded, so a partial release never goes live.
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
