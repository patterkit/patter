name: Tour example release

# The Interactive Tour as a standalone download: the `tour.patter` SOURCE project packed into
# a single `tour.patterpack` file that anyone who just installed Patterpad can grab and open
# (File > Open Patterpack, or double-click). Tagging `tour-vX.Y.Z` packs it (source only - no
# audio, no build artifacts, exactly what `pack` carries) and attaches it to the matching GitHub
# Release. Download-only; not bundled in the app. Packing needs the workspace built (the `patter`
# CLI), unlike the old plain-zip step; the tour's validity is still covered by the main test suite.
on:
  push:
    tags: ["tour-v*"]

permissions:
  contents: write

jobs:
  tour:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack the tour into a .patterpack (source only - no audio, no build artifacts)
        run: node packages/cli/dist/cli.js pack examples/projects/tour.patter -o "$GITHUB_WORKSPACE/tour.patterpack"
      - name: Attach the tour to the release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: false  # never claim GitHubs Latest badge - that stays on Patterpad for the auto-updater
          name: Interactive Tour ${{ github.ref_name }}
          body: |
            **The Patter Interactive Tour** - a small, playable Patter story that teaches the
            format by playing it: choices, the three selectors, properties and conditions,
            closed captions, and the machinery underneath.

            **`tour.patterpack`** is the whole project in one file. In Patterpad, open it with
            **File > Open Patterpack…** (or just double-click it); Patterpad asks where to unpack
            the project, then opens it. Press **Play from Start**. Audio is not included; the tour
            plays fine without it.

            New to Patter? Start at https://patterkit.dev/getting-started/
          files: tour.patterpack
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
