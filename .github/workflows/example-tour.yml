name: Tour example release

# The Interactive Tour as a standalone download: a zip of the `tour.patter` SOURCE project
# that anyone who just installed Patterpad can grab and open (File > Open the .patter folder).
# Tagging `tour-vX.Y.Z` zips it (source only - no audio, no build artifacts) and attaches it to
# the matching GitHub Release. Download-only; not bundled in the app. No build needed - it's a
# plain source zip; the tour's validity is covered by the main test suite.
on:
  push:
    tags: ["tour-v*"]

permissions:
  contents: write

jobs:
  tour:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip the tour source (no audio, no build artifacts, no .DS_Store)
        working-directory: examples/projects
        run: zip -r "$GITHUB_WORKSPACE/tour.patter.zip" tour.patter -x '*.DS_Store'
      - name: Attach the tour to the release
        uses: softprops/action-gh-release@v2
        with:
          name: Interactive Tour ${{ github.ref_name }}
          body: |
            **The Patter Interactive Tour** - a small, playable Patter story that teaches the
            format by playing it: choices, the three selectors, properties and conditions,
            closed captions, and the machinery underneath.

            **`tour.patter.zip`** is the source project. Unzip it, then open the `tour.patter`
            folder in Patterpad (double-click on macOS, or **File > Open** on Windows / Linux)
            and press **Play from Start**. Audio is not included; the tour plays fine without it.

            New to Patter? Start at https://patterkit.dev/getting-started/
          files: tour.patter.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
